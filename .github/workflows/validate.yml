name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate JSON files
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r file; do
            python3 -m json.tool "$file" >/dev/null
          done < <(find . -type f \( -name '*.json' -o -name '*.jsonc' -o -name '*.code-profile' \) | sort)

      - name: Validate shell scripts
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r file; do
            bash -n "$file"
          done < <(find . -type f -name '*.sh' | sort)
